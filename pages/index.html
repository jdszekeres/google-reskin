<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Google</title>
    <link rel="stylesheet" href="../styles/page.css">
</head>
<body>
    <div id="container">
        <div id="title-container">
            <h1>Google like it's 1979</h1>
        </div>
        
        <div id="search-container">
            <input type="text" placeholder="Search Google" id="searchInput">
            <button id="searchButton">Search</button>
        </div>

        <div id="settings-container">
            
            <label for="enable" id="enable-label">
                <input type="checkbox" id="enable" checked>
                Enable Retro Mode on results page
            </label>

            <label for="color-buttons" id="color-label">
                Color
                <input type="checkbox" id="green-button" class="color-button">
                <input type="checkbox" id="blue-button" class="color-button">
                <input type="checkbox" id="grey-button" class="color-button">
            </label>
            
        </div>

        <div id="suggestions-container">

        </div>
    </div>
</body>
<script src="../scripts/search-page.js"></script>
</html>
